# infrastructure/cert-manager/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cert-manager

helmCharts:
  - name: cert-manager
    repo: https://charts.cert-manager.io
    version: v1.14.4
    releaseName: cert-manager
    namespace: cert-manager
    valuesInline:
      installCRDs: true
      replicaCount: 2
      global:
        leaderElection:
          namespace: cert-manager
      prometheus:
        enabled: true
        servicemonitor:
          enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      webhook:
        replicaCount: 2

resources:
  - namespace.yaml
  - cluster-issuers.yaml

---
# infrastructure/cert-manager/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/managed-by: argocd
    pod-security.kubernetes.io/enforce: baseline

---
# infrastructure/cert-manager/cluster-issuers.yaml
#
# ClusterIssuers — cluster-scoped certificate authorities
# Two issuers:
#   1. letsencrypt-staging  — for testing (avoids rate limits)
#   2. letsencrypt-prod     — for real TLS certs on production ingresses
#   3. internal-ca          — for internal service-to-service mTLS

# Let's Encrypt Staging (test first)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: platform@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      # DNS-01 challenge via Route53 (avoids needing public HTTP endpoints)
      - dns01:
          route53:
            region: us-east-1
            # IRSA: cert-manager SA is bound to an IAM role with Route53 perms
            # No explicit credentials needed — uses pod identity
        selector:
          dnsZones:
            - "internal.example.com"

---
# Let's Encrypt Production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
        selector:
          dnsZones:
            - "internal.example.com"

---
# Internal CA for mTLS between services
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca
spec:
  ca:
    # The internal CA cert/key stored as a K8s secret
    # Provisioned by Vault PKI engine during cluster bootstrap
    secretName: internal-ca-keypair
