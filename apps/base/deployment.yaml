# apps/base/deployment.yaml
#
# Base Deployment — every field is intentional
# ═══════════════════════════════════════════════════════════════════════════
# Senior engineers review this for:
#   ✓ Security context (non-root, read-only FS, dropped capabilities)
#   ✓ Resource requests AND limits (VPA can tune, but base is set)
#   ✓ Liveness / readiness / startup probes (different purposes!)
#   ✓ Pod topology spread (don't put all pods on one node)
#   ✓ Graceful shutdown (preStop hook + terminationGracePeriodSeconds)
#   ✓ No :latest image tags (overlays pin the tag)
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: api-service
  labels:
    app.kubernetes.io/name: api-service
    app.kubernetes.io/component: backend
  annotations:
    # ArgoCD Image Updater watches this annotation to auto-update the image tag
    argocd-image-updater.argoproj.io/image-list: "api=ghcr.io/YOUR_ORG/api-service"
    argocd-image-updater.argoproj.io/api.update-strategy: semver
    argocd-image-updater.argoproj.io/api.allow-tags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  # Base: 2 replicas. Overlays override this.
  replicas: 2

  # Never use Recreate in prod — it causes downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime: always have full replicas available

  selector:
    matchLabels:
      app.kubernetes.io/name: api-service

  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-service
        app.kubernetes.io/component: backend
        # Version label helps with canary traffic routing
        version: "stable"
      annotations:
        # Force rolling update when configmap/secret changes
        # (Kustomize configMapGenerator handles this automatically)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      # ── Scheduling ──────────────────────────────────────────────────────
      # Spread pods across availability zones and nodes
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: api-service
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: api-service

      # Anti-affinity: prefer not co-locating replicas on same node
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: api-service
                topologyKey: kubernetes.io/hostname

      # ── Identity & RBAC ──────────────────────────────────────────────────
      serviceAccountName: api-service
      automountServiceAccountToken: false  # Explicitly mount only if needed

      # ── Security (pod level) ─────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault   # Enable seccomp (Kubernetes 1.22+)

      # ── Graceful shutdown ────────────────────────────────────────────────
      # Total budget = terminationGracePeriodSeconds
      # preStop sleep + app shutdown time must fit within this budget
      terminationGracePeriodSeconds: 60

      # ── Init containers ──────────────────────────────────────────────────
      initContainers:
        # Wait for database to be ready before starting main container
        - name: wait-for-db
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 ${DB_HOST} ${DB_PORT}; do
                echo "Waiting for database at ${DB_HOST}:${DB_PORT}..."
                sleep 2
              done
              echo "Database is ready"
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: api-service-db
                  key: host
            - name: DB_PORT
              value: "5432"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      # ── Main container ───────────────────────────────────────────────────
      containers:
        - name: api-service
          image: ghcr.io/YOUR_ORG/api-service:latest  # Overridden by overlay

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # ── Security (container level) ─────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true   # Immutable container FS
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]   # Drop ALL linux capabilities
              # Add back only what's strictly needed:
              # add: ["NET_BIND_SERVICE"]  # Only if binding port < 1024

          # ── Resources ─────────────────────────────────────────────────
          # Requests: guaranteed allocation
          # Limits: hard cap (OOMKill if memory exceeded)
          # Rule: requests ≈ 50-70% of limits (headroom for bursts)
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # ── Environment ────────────────────────────────────────────────
          env:
            - name: APP_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['environment']  # Injected by Kustomize
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: api-service-config

          # Sensitive config injected by External Secrets (from Vault)
          # These are mounted as files, not env vars (avoids process listing exposure)
          volumeMounts:
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp   # writable temp dir (readOnlyRootFilesystem=true)
            - name: cache
              mountPath: /app/cache

          # ── Probes ────────────────────────────────────────────────────
          # Startup probe: give the app time to initialize before liveness kicks in
          # (Prevents premature kills during slow startup)
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: http
            failureThreshold: 30   # 30 × 2s = 60s max startup time
            periodSeconds: 2

          # Readiness probe: remove from Service endpoints when not ready
          # Use a different endpoint than liveness to allow graceful drain
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3

          # Liveness probe: restart if fundamentally broken
          # Be conservative — aggressive liveness kills cascade
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # Graceful shutdown: signal readiness probe to fail first,
          # then wait for in-flight requests before SIGTERM
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # Signal app to stop accepting new connections
                    # then wait for in-flight requests to drain (30s)
                    sleep 5
                    kill -SIGTERM 1
                    sleep 25

      # ── Volumes ──────────────────────────────────────────────────────────
      volumes:
        # Secrets injected by External Secrets Operator (sourced from Vault)
        - name: secrets
          secret:
            secretName: api-service-secrets
            defaultMode: 0400   # Read-only by owner only

        # Ephemeral writable dirs (needed because readOnlyRootFilesystem=true)
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi

        - name: cache
          emptyDir:
            sizeLimit: 500Mi
