# apps/base/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: api-service
  labels:
    app.kubernetes.io/name: api-service
    # PodSecurity admission — enforce restricted standards in prod
    # Overridden per-env in overlays (dev = baseline, prod = restricted)
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted

---
# apps/base/serviceaccount.yaml
#
# Dedicated ServiceAccount per app (never use default SA)
# Annotated for IRSA (AWS) or Workload Identity (GCP) to assume IAM roles
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service
  namespace: api-service
  labels:
    app.kubernetes.io/name: api-service
  annotations:
    # AWS IRSA — bind to an IAM role with minimal S3/SQS permissions
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/api-service
    # GCP Workload Identity (use one or the other, not both)
    # iam.gke.io/gcp-service-account: api-service@PROJECT.iam.gserviceaccount.com
automountServiceAccountToken: false

---
# apps/base/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: api-service
  labels:
    app.kubernetes.io/name: api-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-service
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP

---
# apps/base/hpa.yaml
#
# Horizontal Pod Autoscaler
# Scale on both CPU and custom metric (RPS from Prometheus adapter)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-service
  namespace: api-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-service

  minReplicas: 2    # Never scale below 2 (HA)
  maxReplicas: 10   # Overridden in prod overlay

  metrics:
    # CPU-based scaling (classic)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Memory-based scaling (useful for memory-bound workloads)
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

    # Custom metric: requests per second (via Prometheus Adapter)
    # Requires prometheus-adapter to be configured with this metric name
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"   # Scale when avg RPS per pod > 100

  behavior:
    # Scale up aggressively (meet demand fast)
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60

    # Scale down conservatively (avoid thrashing)
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cooldown
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# apps/base/pdb.yaml
#
# PodDisruptionBudget — guarantees minimum availability during node drains
# Without this, a node drain can kill ALL pods of a deployment at once
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-service
  namespace: api-service
spec:
  # At least 1 pod must remain available during voluntary disruptions
  # Use minAvailable instead of maxUnavailable for deployments with minReplicas=2
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-service

---
# apps/base/networkpolicy.yaml
#
# NetworkPolicy — default deny + explicit allow (microsegmentation)
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, etc.)
# Flannel does NOT support NetworkPolicy — verify before using

# Default deny: all ingress and egress blocked unless explicitly allowed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: api-service
spec:
  podSelector: {}   # Applies to ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress

---
# Allow ingress from ingress-nginx only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: api-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

---
# Allow Prometheus to scrape metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: api-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090

---
# Allow egress to database (RDS/Cloud SQL)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-database
  namespace: api-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-service
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 5432   # PostgreSQL

---
# Allow egress to kube-dns (required for DNS resolution)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: api-service
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-service
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# apps/base/externalsecret.yaml
#
# ExternalSecret — pulls secrets from Vault into a Kubernetes Secret
# The SecretStore is deployed by the external-secrets infrastructure component
# NEVER commit actual secrets to Git — this only references paths in Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-service-secrets
  namespace: api-service
  labels:
    app.kubernetes.io/name: api-service
spec:
  # How often to sync from Vault (detect rotation)
  refreshInterval: 5m

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore   # Shared across namespaces

  target:
    name: api-service-secrets   # The K8s Secret to create
    creationPolicy: Owner       # ESO owns the secret lifecycle
    deletionPolicy: Retain      # Keep secret if ExternalSecret is deleted

    # Template to structure the secret data
    template:
      engineVersion: v2
      data:
        # DB connection string constructed from individual Vault fields
        DATABASE_URL: "postgresql://{{ .db_user }}:{{ .db_pass }}@{{ .db_host }}:5432/{{ .db_name }}?sslmode=require"
        JWT_SECRET: "{{ .jwt_secret }}"

  data:
    - secretKey: db_user
      remoteRef:
        key: secret/api-service/database
        property: username
    - secretKey: db_pass
      remoteRef:
        key: secret/api-service/database
        property: password
    - secretKey: db_host
      remoteRef:
        key: secret/api-service/database
        property: host
    - secretKey: db_name
      remoteRef:
        key: secret/api-service/database
        property: name
    - secretKey: jwt_secret
      remoteRef:
        key: secret/api-service/auth
        property: jwt_secret

---
# apps/base/servicemonitor.yaml
#
# ServiceMonitor — tells Prometheus Operator to scrape this service
# Requires kube-prometheus-stack or prometheus-operator to be installed
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-service
  namespace: api-service
  labels:
    app.kubernetes.io/name: api-service
    # This label must match the Prometheus CR's serviceMonitorSelector
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: api-service
  namespaceSelector:
    matchNames:
      - api-service
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      # Honor labels from the app (environment, version, etc.)
      honorLabels: false
      metricRelabelings:
        # Drop high-cardinality debug metrics in prod to reduce storage
        - sourceLabels: [__name__]
          regex: "go_.*"
          action: drop
