# apps/overlays/prod/rollout.yaml
#
# ARGO ROLLOUTS — Canary Deployment Strategy
# ═══════════════════════════════════════════════════════════════════════════
# Replaces the base Deployment in prod with an Argo Rollout resource.
# ArgoCD detects Rollout health via the custom health check in values.yaml.
#
# Canary strategy:
#   1. Send 20% traffic to new version
#   2. Wait 5 min, check error rate metric
#   3. If OK → send 50% → wait 5 min → check again
#   4. If OK → promote to 100%
#   5. If metric fails at any step → auto-rollback
#
# This replaces: kubectl set image / helm upgrade for production workloads
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-service
  namespace: api-service
  labels:
    app.kubernetes.io/name: api-service
    environment: prod
spec:
  replicas: 4

  selector:
    matchLabels:
      app.kubernetes.io/name: api-service

  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-service
        version: stable

    spec:
      # (Same pod spec as base deployment — abbreviated here)
      serviceAccountName: api-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: api-service
          image: ghcr.io/YOUR_ORG/api-service:v1.4.2
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5 && kill -SIGTERM 1 && sleep 25"]
      terminationGracePeriodSeconds: 60
      volumes:
        - name: secrets
          secret:
            secretName: api-service-secrets
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi

  # ── Canary Strategy ────────────────────────────────────────────────────────
  strategy:
    canary:
      # The canary service gets a subset of traffic
      # The stable service continues serving full traffic until promoted
      canaryService: api-service-canary
      stableService: api-service

      # Traffic routing via NGINX ingress (weight-based)
      trafficRouting:
        nginx:
          stableIngress: api-service-stable
          annotationPrefix: nginx.ingress.kubernetes.io
          additionalIngressAnnotations:
            canary-by-header: "X-Canary"   # Allow forced canary via header

      # Steps define the promotion pipeline
      steps:
        # Step 1: 20% canary traffic
        - setWeight: 20

        # Step 2: Pause for analysis (Prometheus metrics gate)
        - analysis:
            templates:
              - templateName: api-service-success-rate
            args:
              - name: service-name
                value: api-service-canary

        # Step 3: Wait 5 minutes (human observation window)
        - pause:
            duration: 5m

        # Step 4: Increase to 50%
        - setWeight: 50

        # Step 5: Another analysis pass
        - analysis:
            templates:
              - templateName: api-service-success-rate
              - templateName: api-service-latency-p99
            args:
              - name: service-name
                value: api-service-canary

        # Step 6: Pause for 5 more minutes
        - pause:
            duration: 5m

        # Step 7: Promote to 100% (if analysis passed)
        - setWeight: 100

      # Maximum number of pods in the canary at any time
      maxSurge: "25%"
      maxUnavailable: 0

---
# AnalysisTemplate: HTTP success rate must be > 99%
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-service-success-rate
  namespace: api-service
spec:
  args:
    - name: service-name

  metrics:
    - name: success-rate
      # Query every 30s for 3 minutes
      interval: 30s
      count: 6
      # Fail if any measurement is below threshold
      successCondition: result[0] >= 0.99
      failureLimit: 1   # Allow 1 failure before aborting rollout

      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(
              rate(
                http_requests_total{
                  service="{{args.service-name}}",
                  status!~"5.."
                }[2m]
              )
            ) /
            sum(
              rate(
                http_requests_total{
                  service="{{args.service-name}}"
                }[2m]
              )
            )

---
# AnalysisTemplate: p99 latency must be < 500ms
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-service-latency-p99
  namespace: api-service
spec:
  args:
    - name: service-name

  metrics:
    - name: latency-p99
      interval: 30s
      count: 6
      successCondition: result[0] <= 0.5   # 500ms in seconds
      failureLimit: 1

      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(
              0.99,
              sum(
                rate(
                  http_request_duration_seconds_bucket{
                    service="{{args.service-name}}"
                  }[2m]
                )
              ) by (le)
            )
